<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGO Login - VipherAid</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<section class="py-5" style="min-height:100vh; display:flex; align-items:center;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="va-card p-4 p-lg-5">
          <div class="d-flex align-items-center gap-2 mb-3">
            <img src="{{ url_for('static', filename='logo_cropped.png') }}" class="va-logo-sm" alt="VipherAid">
            <strong>VipherAid</strong>
          </div>

          <h1 class="fw-bold mb-2">NGO / Rescuer Login</h1>
          <p class="va-soft mb-4">This protects the dashboard so only verified teams update status.</p>

          <form method="POST">
            <div class="mb-3">
              <label class="form-label fw-bold">Organization / NGO Name *</label>
              <input name="org" class="form-control" required placeholder="Street Paws Rescue">
            </div>
            <div class="mb-4">
              <label class="form-label fw-bold">Access Code *</label>
              <input name="code" class="form-control" required placeholder="VIPERNGO">
              <div class="va-soft small mt-2">Demo code: <b>VIPERNGO</b></div>
            </div>
            <button class="va-btn w-100" type="submit">
              <i class="fa-solid fa-shield"></i>Open Dashboard
            </button>
            <div class="mt-3">
              <a class="va-soft small" href="/">← Back to Home</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>

</body>
</html>
